<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムチャットアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- ヘッダー -->
        <div class="chat-header">
            <h1>💬 チャットルーム</h1>
            <div class="user-info">
                <span id="current-username">ゲスト</span>
                <span id="online-count">0人</span>
            </div>
        </div>

        <!-- メインコンテンツ -->
        <div class="chat-content">
            <!-- ユーザー情報パネル -->
            <div class="setup-panel" id="setup-panel">
                <h2>ニックネームを入力してください</h2>
                <input 
                    type="text" 
                    id="username-input" 
                    placeholder="ニックネームを入力..." 
                    maxlength="20"
                >
                <button id="join-btn" onclick="joinChat()">チャットに参加</button>
            </div>

            <!-- チャットエリア（非表示） -->
            <div class="chat-main" id="chat-main" style="display: none;">
                <!-- オンラインユーザーリスト -->
                <div class="users-panel">
                    <h3>オンラインユーザー</h3>
                    <ul id="users-list"></ul>
                </div>

                <!-- メッセージエリア -->
                <div class="messages-container">
                    <div id="messages" class="messages"></div>
                </div>

                <!-- メッセージ入力エリア -->
                <div class="input-area">
                    <button id="image-btn" aria-label="画像を選択">📷</button>
                    <input type="file" id="image-input" accept="image/*" style="display:none;" />
                    <button id="video-btn" aria-label="動画を選択">🎞️</button>
                    <input type="file" id="video-input" accept="video/*" style="display:none;" />
                    <input 
                        type="text" 
                        id="message-input" 
                        placeholder="メッセージを入力..." 
                        onkeypress="handleKeyPress(event)"
                    >
                    <button id="send-btn" onclick="sendMessage()">送信</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 通話モーダル / パネル -->
    <div id="call-modal" class="call-modal" style="display:none;">
        <div class="call-backdrop"></div>
        <div class="call-box">
            <div class="call-header">
                <span id="call-status">着信</span>
                <button id="call-end-btn" class="danger" style="display:none;">通話終了</button>
            </div>
            <div class="call-videos">
                <video id="remote-video" autoplay playsinline></video>
                <video id="local-video" autoplay muted playsinline></video>
            </div>
            <div class="call-controls">
                <button id="call-accept-btn">応答</button>
                <button id="call-decline-btn">拒否</button>
                <button id="mute-btn" style="display:none;">ミュート</button>
                <button id="cam-toggle-btn" style="display:none;">カメラOFF</button>
                <button id="minimize-btn" style="display:none;">最小化</button>
            </div>
        </div>
    </div>

    <!-- ミニ通話バー（最小化時に表示） -->
    <div id="mini-call-bar" class="mini-call-bar" style="display:none;">
        <video id="mini-local" autoplay muted playsinline></video>
        <video id="mini-remote" autoplay playsinline></video>
        <div class="mini-controls">
            <button id="mini-unminimize">展開</button>
            <button id="mini-end">終了</button>
        </div>
    </div>

    <!-- Socket.IOライブラリの読込 -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- クライアント側のJavaScript -->
    <script src="client.js"></script>
</body>
</html>
